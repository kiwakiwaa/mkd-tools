name: Windows Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=RELEASE -DMKD_BUILD_CLI=ON -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --config RELEASE

      - name: Run mkd
        if: always()
        run: |
          mkdir output
          echo === Running mkd ===
          .\build\cli\RELEASE\mkd.exe -d .\test\test-data -e TESTDICT -o output
          echo === Exit code: %ERRORLEVEL% ===

      - name: List output files
        if: always()
        shell: cmd
        run: dir /s /b output